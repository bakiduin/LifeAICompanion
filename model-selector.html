<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Portal | NIVI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #fcfcfc;
            color: #1e293b;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .input-glow:focus {
            outline: none;
            border-color: #6C5CE7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-light mb-2">Intelligence Portal</h1>
            <p class="text-gray-500 text-sm">Provide your Gemini AI Studio key to activate the neural network.</p>
        </div>

        <div class="glass-card p-8 rounded-[2rem] shadow-sm">
            <div class="mb-6">
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2 ml-1">Gemini API
                    Key</label>
                <input type="password" id="apiKey" placeholder="Enter AI Studio Key..."
                    class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-transparent input-glow transition-all text-sm">
            </div>

            <button onclick="activateIntelligence()" id="activateBtn"
                class="w-full bg-[#6C5CE7] text-white py-4 rounded-2xl font-semibold hover:bg-[#5a4cc7] transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                <span>Initialize Neural Link</span>
            </button>

            <p class="mt-6 text-[11px] text-gray-400 text-center leading-relaxed">
                Your key is stored locally in your browser's encrypted storage. <br>NIVI never transmits this key to any
                third-party server.
            </p>
        </div>

        <a href="https://aistudio.google.com/app/apikey" target="_blank"
            class="block text-center mt-8 text-xs text-indigo-500 hover:underline">
            Don't have a key? Get one from Gemini AI Studio
        </a>
    </div>

    <script>
        function activateIntelligence() {
            const key = document.getElementById('apiKey').value.trim();
            const btn = document.getElementById('activateBtn');

            if (!key) {
                alert("Please enter a valid API Key to proceed.");
                return;
            }

            btn.innerText = "Syncing...";
            btn.disabled = true;

            // Update the Local JSON Ledger
            try {
                const ledger = JSON.parse(localStorage.getItem('nivi_ledger')) || {};
                ledger.intelligence = {
                    provider: 'google-gemini',
                    apiKey: key,
                    activatedAt: new Date().toISOString()
                };

                localStorage.setItem('nivi_ledger', JSON.stringify(ledger));

                // Success transition to the main interface
                setTimeout(() => {
                    window.location.href = 'nivi.html';
                }, 1000);
            } catch (e) {
                alert("Error saving configuration.");
                btn.disabled = false;
                btn.innerText = "Initialize Neural Link";
            }
        }
    </script>
</body>

</html>
