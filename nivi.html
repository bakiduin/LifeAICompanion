<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NIVI | Neural Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --nivi-bg: #F8FAFC;
            --nivi-accent: #6C5CE7;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--nivi-bg);
            color: #1e293b;
            overflow: hidden;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .editor-textarea {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
            resize: none;
        }

        .chat-bubble {
            max-width: 85%;
            border-radius: 1.25rem;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .user-msg {
            background: #e2e8f0;
            color: #1e293b;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }

        .ai-msg {
            background: var(--nivi-accent);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.15);
        }

        #handshake-overlay {
            transition: all 0.5s ease;
        }
    </style>
</head>

<body class="h-screen flex flex-col">

    <div id="handshake-overlay"
        class="fixed inset-0 z-[100] bg-white/90 backdrop-blur-md flex items-center justify-center text-center">
        <div class="p-10 bg-white rounded-[2.5rem] border border-slate-100 shadow-2xl max-w-sm">
            <div
                class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-6 text-[#6C5CE7]">
                <span class="material-symbols-outlined text-3xl">folder_zip</span>
            </div>
            <h2 class="text-2xl font-bold mb-2">Neural Access</h2>
            <p class="text-gray-500 text-sm mb-8">Select your <b>Logseq Graph</b> folder. NIVI will sync with the
                <b>/journals</b> subdirectory.
            </p>
            <button onclick="initGraphAccess()"
                class="w-full bg-[#6C5CE7] text-white py-4 rounded-2xl font-bold shadow-lg hover:scale-[1.02] transition-transform">
                Authorize Graph
            </button>
        </div>
    </div>

    <nav class="glass-nav h-16 px-6 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-indigo-100 rounded-lg text-indigo-600"><span
                    class="material-symbols-outlined text-xl">psychology</span></div>
            <div>
                <h1 id="graph-title" class="text-sm font-bold tracking-tight">Neural Ledger</h1>
                <div class="flex items-center gap-2 group cursor-pointer relative"
                    onclick="document.getElementById('date-picker').showPicker()">
                    <span class="material-symbols-outlined text-[14px] text-[#6C5CE7]">calendar_month</span>
                    <span id="journal-date-label"
                        class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Select Date</span>
                    <input type="date" id="date-picker" class="absolute inset-0 opacity-0 cursor-pointer"
                        onchange="handleDateChange(this.value)">
                </div>
            </div>
        </div>
        <div id="sync-status"
            class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-bold flex items-center gap-1.5 border border-green-100 opacity-0 transition-opacity">
            <span class="material-symbols-outlined text-[14px]">check_circle</span> SYNCED
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <section class="w-3/5 flex flex-col bg-white border-r border-slate-100">
            <div class="px-6 py-3 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Journals
                    Subdirectory</span>
                <span id="save-timestamp" class="text-[10px] text-slate-300 italic">Connected</span>
            </div>
            <textarea id="journal-editor"
                class="editor-textarea flex-1 p-10 text-lg leading-relaxed text-slate-700 outline-none"
                placeholder="Start typing to log your daily progress..."></textarea>
        </section>

        <section class="w-2/5 flex flex-col bg-slate-50/50">
            <div id="chat-window" class="flex-1 overflow-y-auto p-6 flex flex-col">
                <div class="ai-msg chat-bubble">System live. I am monitoring your journals subdirectory for new
                    insights.</div>
            </div>
            <div class="p-4 bg-white border-t border-slate-100">
                <div class="relative flex items-center gap-2">
                    <input type="text" id="ai-input"
                        class="flex-1 pl-4 pr-12 py-3.5 bg-slate-100 border-none rounded-2xl outline-none text-sm"
                        placeholder="Query your intelligence ledger...">
                    <button onclick="askNivi()" class="p-2.5 bg-[#6C5CE7] text-white rounded-xl"><span
                            class="material-symbols-outlined text-sm">send</span></button>
                </div>
            </div>
        </section>
    </div>

    <script>
        let graphDirHandle, journalsDirHandle, currentFileHandle;
        let currentFileName = "";
        const ledger = JSON.parse(localStorage.getItem('nivi_ledger')) || {};
        const editor = document.getElementById('journal-editor');

        async function initGraphAccess() {
            try {
                // Step 1: User picks the ROOT Logseq folder
                graphDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });

                // Step 2: Access 'journals' subdirectory
                try {
                    journalsDirHandle = await graphDirHandle.getDirectoryHandle('journals', { create: false });
                } catch (e) {
                    alert("Folder 'journals' not found in this directory. Please select a valid Logseq graph.");
                    return;
                }

                document.getElementById('handshake-overlay').classList.add('hidden');
                document.getElementById('sync-status').classList.remove('opacity-0');

                // Default load: Today
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('date-picker').value = today;
                await handleDateChange(today);
            } catch (err) {
                console.error("Access denied.");
            }
        }

        async function handleDateChange(dateValue) {
            if (!journalsDirHandle) return;
            const [y, m, d] = dateValue.split('-');
            currentFileName = `${y}_${m}_${d}.md`;
            document.getElementById('journal-date-label').innerText = currentFileName;

            await loadJournalFile(currentFileName);
        }

        async function loadJournalFile(fileName) {
            try {
                currentFileHandle = await journalsDirHandle.getFileHandle(fileName, { create: true });
                const file = await currentFileHandle.getFile();
                editor.value = await file.text();
                updateSyncUI('READY', 'text-green-600', 'bg-green-50');
            } catch (err) {
                editor.value = "Error loading daily journal.";
            }
        }

        async function autoSync() {
            if (!currentFileHandle) return;
            updateSyncUI('SAVING...', 'text-amber-600', 'bg-amber-50');
            try {
                const writable = await currentFileHandle.createWritable();
                await writable.write(editor.value);
                await writable.close();
                updateSyncUI('SYNCED', 'text-green-600', 'bg-green-50');
                document.getElementById('save-timestamp').innerText = `Last sync: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                updateSyncUI('ERROR', 'text-red-600', 'bg-red-50');
            }
        }

        function updateSyncUI(text, color, bg) {
            const status = document.getElementById('sync-status');
            status.innerHTML = `<span class="material-symbols-outlined text-[14px]">sync</span> ${text}`;
            status.className = `px-3 py-1 ${bg} ${color} rounded-full text-[10px] font-bold flex items-center gap-1.5 border border-current`;
        }

        let debounce;
        editor.addEventListener('input', () => {
            clearTimeout(debounce);
            debounce = setTimeout(autoSync, 1000);
        });

        async function askNivi() {
            const input = document.getElementById('ai-input');
            const query = input.value.trim();
            if (!query || !ledger.intelligence?.apiKey) return;

            const chat = document.getElementById('chat-window');
            chat.innerHTML += `<div class="user-msg chat-bubble">${query}</div>`;
            input.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${ledger.intelligence.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `File: journals/${currentFileName}. Content: "${editor.value}". User query: ${query}` }] }]
                    })
                });
                const data = await response.json();
                chat.innerHTML += `<div class="ai-msg chat-bubble">${data.candidates[0].content.parts[0].text}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="ai-msg chat-bubble bg-red-500">Neural Link Offline.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>

</html>
